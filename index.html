async function pool(items, n, fn) {
  let i = 0;
  const workers = Array.from({length:Math.min(n,items.length)}, async () => {
    while (i < items.length && state.running) {
      const idx = i++;
      try { await fn(items[idx], idx); }
      catch(e) { log(`Row ${idx+1} error: ${e.message}`, "err"); }
    }
  });
  await Promise.all(workers);
}

/* ═══════════════════════════════════════════════════════════════
   Anthropic API call — shared, rate-limit-aware, jitter-backed

   Why this exists:
   When many workers fire in parallel and Anthropic returns 429, a naïve
   per-worker exponential backoff produces a "thundering herd" — all workers
   retry at 1s, all hit 429 again, then all retry at 2s, etc.

   Fix: ONE module-level cooldown deadline (`rateLimit.until`). When any worker
   sees a 429, it bumps the shared deadline. Every worker checks the deadline
   BEFORE issuing its next request. Anthropic's `retry-after` header is honored
   when present. Jitter is added so restart bursts don't re-sync.
   ═══════════════════════════════════════════════════════════════ */
const rateLimit = {
  until: 0,              // epoch ms — no one calls before this time
  consecutive429: 0,     // if it keeps happening, widen the cooldown
  totalBackoffMs: 0,     // diagnostics
};

function setCooldown(ms, reason) {
  const now = Date.now();
  // bump, never shorten — a worker with later data wins
  rateLimit.until = Math.max(rateLimit.until, now + ms);
  rateLimit.totalBackoffMs += ms;
  const endsIn = Math.round((rateLimit.until - now) / 1000);
  progLog(`⏸ rate-limit cooldown · ${endsIn}s · ${reason}`);
  // Tiny badge in the progress label so the user sees it
  const pl = $("prog-label");
  if (pl) {
    const existing = pl.querySelector(".rl-badge");
    const label = `⏸ cooling ${endsIn}s`;
    if (existing) existing.textContent = label;
    else pl.insertAdjacentHTML("beforeend", `<span class="rl-badge pill warn" style="margin-left:8px">${label}</span>`);
    // Auto-clear badge when cooldown ends
    setTimeout(() => { const b = pl.querySelector(".rl-badge"); if (b && Date.now() >= rateLimit.until) b.remove(); }, endsIn * 1000 + 200);
  }
}

async function respectCooldown() {
  const now = Date.now();
  if (rateLimit.until > now) await sleep(rateLimit.until - now + Math.floor(Math.random() * 250));
}

// Parse Anthropic's rate-limit hints. `retry-after` is the canonical source.
// Fall back to `anthropic-ratelimit-*-reset` if present, then to an adaptive default.
function computeRetryWait(response, attempt) {
  const ra = parseFloat(response.headers.get("retry-after") || "");
  if (!isNaN(ra) && ra > 0) return Math.min(ra * 1000, 60000);   // cap at 60s
  // ISO timestamps — e.g. "2024-..."; compute delta to now
  const reset = response.headers.get("anthropic-ratelimit-requests-reset")
             || response.headers.get("anthropic-ratelimit-tokens-reset");
  if (reset) {
    const ms = new Date(reset).getTime() - Date.now();
    if (ms > 0) return Math.min(ms, 60000);
  }
  // Adaptive default: grow fast when 429s keep coming
  const base = 2000 * Math.pow(1.7, attempt);           // 2s → 3.4 → 5.8 → 9.8 → 16.6
  const burstPenalty = 1000 * Math.min(rateLimit.consecutive429, 5);  // up to +5s
  const jitter = Math.random() * 500;
  return Math.min(base + burstPenalty + jitter, 45000);
}

async function anthropicCall(model, system, userPrompt, maxTokens=300, tools=null) {
  if (!state.keys.anthropic) throw new Error("no anthropic key");
  const body = {
    model, max_tokens: maxTokens, temperature: 0.15,
    system, messages: [{ role:"user", content: userPrompt }],
  };
  if (tools) body.tools = tools;
  // Web search calls can be slow — 180s; regular 60s
  const TIMEOUT_MS = tools ? 180000 : 60000;
  const MAX_ATTEMPTS = 8;

  for (let attempt = 0; attempt < MAX_ATTEMPTS; attempt++) {
    // Respect any shared cooldown before even opening the request
    await respectCooldown();
    if (!state.running && state.progress && state.progress.total) {
      // user pressed Stop mid-cooldown
      throw new Error("aborted during cooldown");
    }

    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), TIMEOUT_MS);

    try {
      const r = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "x-api-key": state.keys.anthropic,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
          "Content-Type": "application/json",
        },
        body: JSON.stringify(body),
        signal: ctrl.signal,
      });
      clearTimeout(timer);

      // ── 429: rate limited ──
      if (r.status === 429) {
        rateLimit.consecutive429++;
        const wait = computeRetryWait(r, attempt);
        setCooldown(wait, `HTTP 429 (attempt ${attempt+1}/${MAX_ATTEMPTS})`);
        if (attempt === MAX_ATTEMPTS - 1) {
          throw new Error(`Rate limited after ${MAX_ATTEMPTS} attempts. Try lowering concurrency/batch size, or wait a minute.`);
        }
        continue;
      }

      // ── 5xx: server-side, retry with backoff but no global cooldown ──
      if (r.status >= 500) {
        const wait = 1500 * Math.pow(2, attempt) + Math.random() * 500;
        progLog(`HTTP ${r.status} server error — retrying in ${Math.round(wait/1000)}s (attempt ${attempt+1}/${MAX_ATTEMPTS})`);
        await sleep(wait);
        continue;
      }

      // ── 4xx other: surface the error body so user sees what's wrong ──
      if (!r.ok) {
        const errText = (await r.text()).slice(0, 300);
        throw new Error(`HTTP ${r.status} ${errText}`);
      }

      // ── Success: reset 429 streak counter ──
      rateLimit.consecutive429 = 0;

      const d = await r.json();
      const text = (d.content||[]).filter(b => b.type === "text").map(b => b.text).join("").trim();
      if (!text) {
        const types = (d.content||[]).map(b => b.type).join(", ") || "none";
        return `[EMPTY RESPONSE] stop_reason=${d.stop_reason||"?"} · blocks=${types} · Try increasing max_tokens or rephrasing.`;
      }
      return text;
    } catch(e) {
      clearTimeout(timer);
      if (e.name === "AbortError") {
        progLog(`Request timed out after ${TIMEOUT_MS/1000}s`);
        if (attempt === MAX_ATTEMPTS - 1) throw new Error(`Timeout after ${TIMEOUT_MS/1000}s × ${MAX_ATTEMPTS} attempts.`);
        await sleep(2000 + Math.random() * 500);
      } else if (e.message === "aborted during cooldown") {
        throw e;
      } else {
        progLog(`Network error: ${e.message}`);
        if (attempt === MAX_ATTEMPTS - 1) throw e;
        await sleep(2000 * Math.pow(1.5, attempt) + Math.random() * 500);
      }
    }
  }
  throw new Error("max retries exceeded");
}

/* ═══════════════════════════════════════════════════════════════
   Helpers
═══════════════════════════════════════════════════════════════ */
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

/* ═══════════════════════════════════════════════════════════════
   Top-bar download + reset
═══════════════════════════════════════════════════════════════ */
$("btn-download-csv").onclick = () => state.data.rows.length && downloadCSV();
$("btn-download-xlsx").onclick = () => state.data.rows.length && downloadXLSX();
$("btn-push-sheet").onclick = () => go("export");
$("btn-reset").onclick = () => {
  if (confirm("Clear keys and session?")) { localStorage.removeItem(LS); localStorage.removeItem(LS + "_progress"); location.reload(); }
};

/* ═══════════════════════════════════════════════════════════════
   Boot
═══════════════════════════════════════════════════════════════ */
renderRail();
renderPanel();

// Offer to restore prior snapshot if one exists
if (localStorage.getItem(LS + "_progress") && !state.data.rows.length) {
  setTimeout(() => {
    if (confirm("Restore your last saved progress snapshot?")) loadProgress();
  }, 400);
}

setStatus(state.keys.anthropic ? "Keys loaded — load a dataset" : "Set your Anthropic key to begin");
</script>
