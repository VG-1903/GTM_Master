<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GTM Master — Personal AI Assistant for every Sheet</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --bg:#0b0d10; --bg2:#111418; --bg3:#161a1f; --bg4:#1d222a;
    --border:#23282f; --border2:#2c333d;
    --text:#e7ecf2; --text2:#9aa4b2; --text3:#6b7280;
    --accent:#f3802d; --accent2:#ff9a4a; --accent-glow:rgba(243,128,45,.12);
    --good:#22c55e; --warn:#eab308; --err:#ef4444;
    --claude:#c77b4e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:13px;line-height:1.45}
  /* ── Layout: fixed left dock + right content ─────────────────── */
  .app{display:grid;grid-template-columns:480px 1fr;height:100vh;overflow:hidden}
  @media (max-width: 1200px){ .app{grid-template-columns:420px 1fr} }
  .dock{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;min-width:0;height:100vh;overflow:hidden}
  .main{background:var(--bg);display:flex;flex-direction:column;min-width:0;overflow:hidden;min-height:0}
  /* Dock header */
  .dock-hdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
  .logo{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--claude));display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff}
  .brand{font-weight:700;font-size:14px}
  .brand-sub{font-size:10px;color:var(--text3);letter-spacing:.8px;text-transform:uppercase}
  /* Stage rail */
  .rail{display:grid;grid-template-columns:repeat(5,1fr);padding:8px;gap:4px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg2)}
  .stage{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;border-radius:6px;cursor:pointer;font-size:10px;color:var(--text2);border:1px solid transparent;transition:.15s;text-align:center;min-width:0}
  .stage:hover{background:var(--bg3);color:var(--text)}
  .stage.on{background:var(--accent-glow);color:var(--accent);border-color:rgba(243,128,45,.25)}
  .stage .num{width:22px;height:22px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text2)}
  .stage.on .num{background:var(--accent);color:#0b0d10}
  .stage.done .num{background:var(--good);color:#0b0d10}
  .stage-lbl{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
  .stage-hint{display:none}
  /* Panel scroll styling */
  .panel::-webkit-scrollbar{width:10px}
  .panel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:6px;border:2px solid var(--bg2)}
  .panel h3{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--text2);margin-bottom:10px;font-weight:600}
  .panel h4{font-size:11px;color:var(--text3);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
  label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:500}
  input[type=text],input[type=password],input[type=number],select,textarea{
    width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);
    padding:8px 10px;border-radius:6px;font-size:12px;font-family:inherit;outline:none;transition:.15s
  }
  input:focus,select:focus,textarea:focus{border-color:var(--accent);background:var(--bg4)}
  textarea{min-height:70px;resize:vertical;line-height:1.5}
  .row{display:flex;gap:8px;margin-bottom:10px}
  .row>*{flex:1}
  .field{margin-bottom:10px}
  .btn{background:var(--accent);color:#0b0d10;border:none;padding:9px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:6px;justify-content:center}
  .btn:hover{background:var(--accent2)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn.sec{background:var(--bg4);color:var(--text)}
  .btn.sec:hover{background:var(--border2)}
  .btn.ghost{background:transparent;border:1px solid var(--border2);color:var(--text2)}
  .btn.ghost:hover{border-color:var(--accent);color:var(--accent)}
  .btn.full{width:100%}
  .btn.sm{padding:5px 10px;font-size:11px}
  .chip-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
  .chip{background:var(--bg3);border:1px solid var(--border);padding:5px 10px;border-radius:999px;font-size:11px;color:var(--text2);cursor:pointer;transition:.15s;user-select:none}
  .chip:hover{border-color:var(--border2);color:var(--text)}
  .chip.on{background:var(--accent-glow);border-color:var(--accent);color:var(--accent)}
  .pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:999px;background:var(--bg4);color:var(--text2);font-weight:500}
  .pill.ok{background:rgba(34,197,94,.15);color:var(--good)}
  .pill.warn{background:rgba(234,179,8,.15);color:var(--warn)}
  .pill.err{background:rgba(239,68,68,.15);color:var(--err)}
  .card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px}
  .card-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .muted{color:var(--text3);font-size:11px}
  .kv{display:grid;grid-template-columns:auto 1fr;gap:4px 12px;font-size:11px}
  .kv>div:nth-child(odd){color:var(--text3)}
  .kv>div:nth-child(even){color:var(--text)}
  hr{border:0;border-top:1px solid var(--border);margin:14px 0}
  details>summary{cursor:pointer;list-style:none;padding:6px 0;color:var(--text2);font-size:11px;user-select:none}
  details>summary:hover{color:var(--text)}
  details>summary::before{content:"▸";display:inline-block;margin-right:6px;transition:.15s}
  details[open]>summary::before{transform:rotate(90deg)}
  /* Footer status bar */
  .dock-ftr{border-top:1px solid var(--border);padding:10px 14px;display:flex;gap:8px;align-items:center;justify-content:space-between;background:var(--bg2);flex-shrink:0}
  .status-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);display:inline-block;margin-right:6px}
  .status-dot.ok{background:var(--good);box-shadow:0 0 8px var(--good)}
  .status-dot.run{background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 1s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  /* Main content area */
  .topbar{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:10px;background:var(--bg2);flex-shrink:0}
  .crumb{font-size:12px;color:var(--text2)}
  .crumb b{color:var(--text)}
  .main-inner{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
  /* Data table */
  .table-wrap{flex:1;overflow:auto;padding:0 16px;min-height:0}
  table{border-collapse:collapse;font-size:11px;width:max-content;min-width:100%}
  th,td{padding:6px 10px;border-bottom:1px solid var(--border);text-align:left;vertical-align:top;white-space:nowrap;max-width:600px;overflow:hidden;text-overflow:ellipsis}
  th{background:var(--bg2);color:var(--text2);font-size:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;position:sticky;top:0;z-index:1;border-bottom:1px solid var(--border2)}
  tbody tr:hover{background:var(--bg2)}
  td.added{background:var(--accent-glow);color:var(--accent)}
  td.err{color:var(--err)}
  .empty{padding:40px;text-align:center;color:var(--text3)}
  .empty-title{font-size:14px;color:var(--text2);margin-bottom:6px}
  .drop{border:2px dashed var(--border2);padding:28px;text-align:center;border-radius:8px;color:var(--text2);margin-bottom:10px;cursor:pointer;transition:.15s;font-size:12px}
  .drop:hover{border-color:var(--accent);background:var(--accent-glow);color:var(--accent)}
  .drop.over{border-color:var(--accent);background:var(--accent-glow)}
  /* Progress */
  .prog-wrap{padding:10px 16px;border-top:1px solid var(--border);background:var(--bg2);display:none;flex-shrink:0}
  .prog-wrap.on{display:block}
  .prog-bar{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin:6px 0}
  .prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:.3s;width:0}
  .prog-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--text2)}
  /* Prompt preview */
  .preview{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;font-family:"SF Mono",Monaco,monospace;font-size:11px;line-height:1.5;white-space:pre-wrap;max-height:240px;overflow-y:auto;color:var(--text2)}
  /* Log */
  .log{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px;font-family:"SF Mono",Monaco,monospace;font-size:10.5px;max-height:160px;overflow-y:auto;margin-top:8px}
  .log-line{padding:2px 0;color:var(--text2)}
  .log-line.err{color:var(--err)}
  .log-line.ok{color:var(--good)}
  .log-line.info{color:var(--text3)}
  .sel-count{font-size:10px;color:var(--accent);font-weight:600;margin-left:6px}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
  ::-webkit-scrollbar-thumb:hover{background:var(--text3)}
  /* Toast */
  .toast{position:fixed;top:16px;right:16px;background:var(--bg4);border:1px solid var(--border2);padding:10px 14px;border-radius:8px;font-size:12px;z-index:999;display:flex;align-items:center;gap:8px;box-shadow:0 6px 20px rgba(0,0,0,.4);transform:translateX(140%);transition:transform .25s ease-out}
  .toast.show{transform:translateX(0)}
  .toast.ok{border-color:var(--good);color:var(--good)}
  .toast.err{border-color:var(--err);color:var(--err)}
  .toast.info{border-color:var(--accent);color:var(--accent)}
  /* Stage step checklist */
  .step{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:11px;color:var(--text2)}
  .step .tick{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px}
  .step.done .tick{background:var(--good);border-color:var(--good);color:#000}
  .step.done{color:var(--text)}
  .step.run .tick{border-color:var(--accent);animation:pulse 1s ease-in-out infinite}
  .step.run{color:var(--accent)}
  .start-btn{background:var(--good);color:#000;border:none;padding:10px 16px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:8px;justify-content:center;width:100%;transition:.15s}
  .start-btn:hover{background:#16a34a}
  .start-btn:disabled{opacity:.4;cursor:not-allowed}
  .start-btn.stop{background:var(--err);color:#fff}
  .saved-badge{display:inline-flex;align-items:center;gap:4px;color:var(--good);font-size:11px;font-weight:600;margin-left:8px}
  /* Sticky action bar — fully opaque, pinned to bottom, never overlaps content */
  .action-bar{position:sticky;bottom:0;margin:24px -16px 0 -16px;padding:14px 16px;background:var(--bg2);border-top:1px solid var(--border2);display:flex;gap:8px;z-index:10;box-shadow:0 -8px 16px -8px rgba(0,0,0,.5)}
  .action-bar .start-btn{flex:2}
  .action-bar .btn{flex:1}
  /* Panel bottom padding matches action-bar height so nothing sits under it */
  .panel{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 16px 0 16px;scroll-behavior:smooth;display:flex;flex-direction:column}
  .panel > *:not(.action-bar){flex-shrink:0}
  .panel-body{flex:1;min-height:0}
  /* Compact stage rail — titles under number */
  .rail .stage{position:relative}
  .rail .stage.done::after{content:"✓";position:absolute;top:3px;right:5px;color:var(--good);font-size:9px;font-weight:700}
</style>
</head>
<body>
<div class="app">

  <!-- ═══════════════ LEFT DOCK (fixed 440px) ═══════════════ -->
  <aside class="dock">
    <div class="dock-hdr">
      <div class="logo">G</div>
      <div style="flex:1">
        <div class="brand">GTM Master</div>
        <div class="brand-sub">Personal AI · Every Sheet</div>
      </div>
      <button class="btn ghost sm" id="btn-reset" title="Clear session">Reset</button>
    </div>

    <!-- Stage rail -->
    <div class="rail" id="rail"></div>

    <!-- Stage panel -->
    <div class="panel" id="panel"></div>

    <!-- Footer status -->
    <div class="dock-ftr">
      <div style="font-size:10px">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Ready</span>
      </div>
      <div class="muted" id="status-meta"></div>
    </div>
  </aside>

  <!-- ═══════════════ RIGHT MAIN (data + progress) ═══════════════ -->
  <main class="main">
    <div class="topbar">
      <div class="crumb" id="crumb">No dataset loaded</div>
      <div style="display:flex;gap:6px">
        <button class="btn ghost sm" id="btn-download-csv">↓ CSV</button>
        <button class="btn ghost sm" id="btn-download-xlsx">↓ XLSX</button>
        <button class="btn ghost sm" id="btn-push-sheet" disabled>↑ Google Sheet</button>
      </div>
    </div>
    <div class="main-inner">
      <div class="table-wrap" id="table-wrap">
        <div class="empty">
          <div class="empty-title">👋 Load a dataset to begin</div>
          <div class="muted">CSV · XLSX · Google Sheets · all fully local except API calls</div>
        </div>
      </div>
      <div class="prog-wrap" id="prog-wrap">
        <div class="prog-meta">
          <span id="prog-label">Working…</span>
          <span id="prog-pct">0 / 0</span>
        </div>
        <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
        <div id="prog-log" class="log"></div>
      </div>
    </div>
  </main>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   GTM MASTER — single-file personal AI assistant
   Stages: Keys · Data · Hypothesis · Classify · People · Enrich · Segment · Score · Export
═══════════════════════════════════════════════════════════════════ */

/* ── State ─────────────────────────────────────────────────────── */
const LS = "gtm_master_v1";
const state = {
  stage: "keys",
  keys: { anthropic: "", apify: "", apollo: "", lusha: "", googleClientId: "" },
  models: { bulk: "claude-haiku-4-5-20251001", reasoning: "claude-sonnet-4-5-20250929" },
  data: { rows: [], cols: [], source: null, fileName: null, sheetId: null, sheetName: null },
  sel: { features: [], urlCol: null, linkedinCol: null, nameCol: null, domainCol: null },
  google: { token: null, expires: 0 },
  gtm: { hypothesis: null, segments: null },
  running: false,
  progress: { done: 0, total: 0, errs: 0 },
  concurrency: 10,
  stageDone: new Set(),
};

/* Load persisted keys + UI state */
try {
  const saved = JSON.parse(localStorage.getItem(LS) || "{}");
  if (saved.keys) Object.assign(state.keys, saved.keys);
  if (saved.models) Object.assign(state.models, saved.models);
  if (saved.gtm) Object.assign(state.gtm, saved.gtm);
  if (saved.sel && Array.isArray(saved.sel.features)) state.sel.features = saved.sel.features;
  if (typeof saved.concurrency === "number") state.concurrency = saved.concurrency;
} catch(e){}

function persist() {
  localStorage.setItem(LS, JSON.stringify({
    keys: state.keys,
    models: state.models,
    gtm: { lastAsk: state.gtm.lastAsk || null, hypothesis: state.gtm.hypothesis, segments: state.gtm.segments },
    sel: { features: state.sel.features },
    concurrency: state.concurrency,
  }));
}

/* ── Stage definitions ─────────────────────────────────────────── */
const STAGES = [
  { id:"keys",   num:"🔑", title:"Keys" },
  { id:"data",   num:"1",  title:"Data" },
  { id:"ask",    num:"2",  title:"Ask Claude" },
  { id:"people", num:"3",  title:"Find People" },
  { id:"export", num:"4",  title:"Export" },
];

/* ── Utility DOM + log ─────────────────────────────────────────── */
const $ = (id) => document.getElementById(id);
const h = (html) => { const d=document.createElement("div"); d.innerHTML=html.trim(); return d.firstElementChild; };

function log(msg, kind="info") {
  const el = $("prog-log");
  if (!el) return;
  const line = document.createElement("div");
  line.className = "log-line " + kind;
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function setStatus(text, kind="") {
  $("status-text").textContent = text;
  const dot = $("status-dot");
  dot.className = "status-dot" + (kind ? " " + kind : "");
}

/* Toast notification (visible confirmation for Save / start / finish) */
function toast(msg, kind="ok", ms=2600) {
  let t = document.getElementById("gtm-toast");
  if (!t) {
    t = document.createElement("div");
    t.id = "gtm-toast";
    t.className = "toast";
    document.body.appendChild(t);
  }
  t.className = "toast " + kind;
  t.innerHTML = `<span>${kind==="ok"?"✓":kind==="err"?"✕":"●"}</span><span>${esc(msg)}</span>`;
  requestAnimationFrame(()=>t.classList.add("show"));
  clearTimeout(t._tid);
  t._tid = setTimeout(()=>t.classList.remove("show"), ms);
}

/* Per-stage step checklist — renders into any container by id */
function renderSteps(containerId, steps) {
  const el = $(containerId);
  if (!el) return;
  el.innerHTML = steps.map((s,i) => `
    <div class="step ${s.state||''}" data-i="${i}">
      <div class="tick">${s.state==="done"?"✓":s.state==="run"?"●":i+1}</div>
      <div>${s.label}</div>
    </div>`).join("");
}
function updateStep(containerId, i, state) {
  const el = $(containerId);
  if (!el) return;
  const row = el.querySelector(`.step[data-i="${i}"]`);
  if (!row) return;
  row.classList.remove("run","done");
  row.classList.add(state);
  row.querySelector(".tick").textContent = state==="done"?"✓":state==="run"?"●":i+1;
}

function setCrumb() {
  const d = state.data;
  if (!d.rows.length) { $("crumb").innerHTML = "No dataset loaded"; return; }
  $("crumb").innerHTML = `<b>${esc(d.fileName || d.sheetName || "Untitled")}</b> · ${d.rows.length} rows · ${d.cols.length} cols`;
}

/* ── Render rail ───────────────────────────────────────────────── */
function renderRail() {
  const rail = $("rail");
  rail.innerHTML = "";
  STAGES.forEach(s => {
    const el = h(`<div class="stage${state.stage===s.id?" on":""}${state.stageDone.has(s.id)?" done":""}" data-id="${s.id}" title="${s.title}">
      <div class="num">${s.num}</div>
      <div class="stage-lbl">${s.title}</div>
    </div>`);
    el.onclick = () => go(s.id);
    rail.appendChild(el);
  });
}

function go(id) {
  state.stage = id;
  renderRail();
  renderPanel();
  const p = $("panel");
  if (p) p.scrollTop = 0;
}

/* Universal save — snapshot current rows + state to localStorage */
function saveProgress(stageLabel) {
  try {
    const snap = {
      ts: Date.now(),
      stage: state.stage,
      data: { rows: state.data.rows, cols: state.data.cols, fileName: state.data.fileName, sheetId: state.data.sheetId, sheetName: state.data.sheetName },
      sel: state.sel,
      gtm: state.gtm,
      stageDone: Array.from(state.stageDone),
    };
    localStorage.setItem(LS + "_progress", JSON.stringify(snap));
    toast(`Progress saved (${stageLabel || state.stage})`, "ok");
    setStatus("Progress saved", "ok");
  } catch(e) { toast("Save failed: " + e.message, "err"); }
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(LS + "_progress");
    if (!raw) return false;
    const snap = JSON.parse(raw);
    if (snap.data && snap.data.rows) Object.assign(state.data, snap.data);
    if (snap.sel) Object.assign(state.sel, snap.sel);
    if (snap.gtm) Object.assign(state.gtm, snap.gtm);
    if (snap.stageDone) state.stageDone = new Set(snap.stageDone);
    setCrumb(); renderTable(); renderRail();
    toast(`Restored snapshot from ${new Date(snap.ts).toLocaleTimeString()}`, "ok");
    return true;
  } catch(e) { return false; }
}

/* Render the sticky action bar at the bottom of every stage panel */
function actionBar({ startId, startLabel, saveLabel = "💾 Save Progress", extraBtns = "" }) {
  return `
    <div class="action-bar">
      ${startId ? `<button class="start-btn" id="${startId}">▶ ${startLabel}</button>` : ''}
      <button class="btn sec" id="save-progress">${saveLabel}</button>
      ${extraBtns}
    </div>`;
}
function wireSaveBtn(label){
  const b = $("save-progress");
  if (b) b.onclick = () => saveProgress(label);
}

/* ── Render panel (per stage) ─────────────────────────────────── */
function renderPanel() {
  const el = $("panel");
  el.innerHTML = "";
  const fn = PANELS[state.stage];
  if (fn) fn(el);
}

const PANELS = {};

/* ──────────── Stage: Keys ──────────── */
PANELS.keys = (el) => {
  el.innerHTML = `
    <h3>API Keys</h3>
    <p class="muted" style="margin-bottom:14px">Stored in <code>localStorage</code> — never sent anywhere except the provider's own API. Use at your own risk; clear with <b>Reset</b>.</p>

    <div class="field">

async function loadFile(file) {
  setStatus("Parsing " + file.name, "run");
  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: "array" });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });
    if (!rows.length) { setStatus("File is empty or unreadable", "err"); toast("No rows found in file", "err"); return; }
    loaded({ rows, fileName: file.name });
  } catch(e) {
    setStatus("Failed to parse file", "err");
    toast("File parse error: " + e.message, "err");
  }
}

function loaded({ rows, fileName, sheetId, sheetName }) {
  if (!rows.length) { setStatus("Empty file", "err"); return; }
  state.data.rows = rows;
  state.data.cols = Object.keys(rows[0]);
  state.data.fileName = fileName || null;
  state.data.sheetId = sheetId || null;
  state.data.sheetName = sheetName || null;
  // Auto-detect role columns
  const lc = state.data.cols.map(c => c.toLowerCase());
  const pick = (...needles) => {
    for (const n of needles) {
      const i = lc.findIndex(c => c === n || c.includes(n));
      if (i >= 0) return state.data.cols[i];
    }
    return null;
  };
  state.sel.nameCol = pick("name","company");
  state.sel.domainCol = pick("domain","website","url");
  state.sel.linkedinCol = pick("linkedin","linkedin url","linkedin_url");
  state.stageDone.add("data");
  setStatus("Loaded " + rows.length + " rows", "ok");
  toast(`Loaded ${rows.length} rows · ${state.data.cols.length} columns`, "ok");
  setCrumb();
  renderTable();
  renderRail();
  renderPanel();
}

/* ──── Google OAuth + Sheets ──── */
function googleAuth() {
  if (!state.keys.googleClientId) { $("gsheet-msg").innerHTML = '<span class="pill err">Set Google Client ID in Keys stage first</span>'; return; }
  if (!window.google) { $("gsheet-msg").innerHTML = '<span class="pill err">GIS script still loading…</span>'; return; }
  const tc = google.accounts.oauth2.initTokenClient({
    client_id: state.keys.googleClientId,
    scope: "https://www.googleapis.com/auth/spreadsheets",
    callback: (resp) => {
      if (resp.access_token) {
        state.google.token = resp.access_token;
        state.google.expires = Date.now() + (resp.expires_in * 1000) - 60000;
        $("gsheet-msg").innerHTML = '<span class="pill ok">Google connected</span>';
        renderPanel();
        $("btn-push-sheet").disabled = false;
      } else {
        $("gsheet-msg").innerHTML = '<span class="pill err">Auth failed</span>';
      }
    },
  });
  tc.requestAccessToken();
}

function parseSheetId(input) {
  const m = input.match(/\/d\/([A-Za-z0-9_-]+)/);
  return m ? m[1] : input.trim();
}

async function loadGoogleSheet() {
  const url = $("sheet-url").value.trim();
  if (!url) return;
  const sid = parseSheetId(url);
  setStatus("Loading Google Sheet…", "run");
  try {
    const meta = await gFetch(`https://sheets.googleapis.com/v4/spreadsheets/${sid}?fields=sheets.properties.title,properties.title`);
    const title = meta.properties.title;
    const tab = meta.sheets[0].properties.title;
    const vals = await gFetch(`https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/${encodeURIComponent(tab)}`);
    const arr = vals.values || [];
    if (!arr.length) throw new Error("Empty sheet");
    const cols = arr[0];
    const rows = arr.slice(1).map(r => { const o={}; cols.forEach((c,i)=>o[c]=r[i]||""); return o; });
    loaded({ rows, sheetId: sid, sheetName: `${title} · ${tab}` });
  } catch (e) {
    setStatus("Sheet load failed", "err");
    $("gsheet-msg").innerHTML = `<span class="pill err">${e.message}</span>`;
  }
}

async function gFetch(url, opts={}) {
  if (!state.google.token) throw new Error("Google not connected — go to Keys stage and sign in");
  if (state.google.expiry && Date.now() > state.google.expiry) throw new Error("Google token expired — sign in again in Keys stage");
  const r = await fetch(url, { ...opts, headers: { Authorization: "Bearer " + state.google.token, "Content-Type":"application/json", ...(opts.headers||{}) } });
  if (r.status === 401) { state.google.token = null; throw new Error("Google token expired — sign in again in Keys stage"); }
  if (!r.ok) throw new Error("Sheets API " + r.status + ": " + (await r.text()).slice(0,200));
  return r.json();
}

/* Ask Haiku to propose column names based on the instruction */
async function suggestColumns() {
  const q = $("ask-q").value.trim();
  if (!q) { toast("Type your instruction first", "err"); return; }
  if (!state.keys.anthropic) { toast("Anthropic key required", "err"); return; }
  const btn = $("ask-suggest-cols");
  btn.textContent = "… thinking";
  btn.disabled = true;
  try {
    const text = await anthropicCall(
      state.models.bulk,
      "You plan column schemas for CSV enrichment. Given an instruction, output ONLY a comma-separated list of 1-6 short snake_case column names that together answer the instruction. No explanation, no quotes, no brackets, just: Name1, Name2, Name3",
      `Instruction: ${q}\n\nProposed column names:`,
      100
    );
    // Clean response — strip anything that isn't the comma list
    let cleaned = text.split("\n")[0].replace(/^[^A-Za-z_]+/, "").replace(/\.$/, "").trim();
    // Validate it looks like a list

  } catch(e) {

  } finally {
    btn.textContent = "✨ Auto-suggest columns from my prompt";
    btn.disabled = false;
  }
}

/* Robust JSON extraction from Claude output (handles ```json fences, prose wrapping, arrays OR objects) */
function extractJSON(text) {
  if (!text) return null;
  // Try direct parse
  try { return JSON.parse(text); } catch(e){}
  // Strip ```json ... ``` fences
  const fence = text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (fence) { try { return JSON.parse(fence[1].trim()); } catch(e){} }
  // Try array first (batch mode returns arrays) — widest [...] span
  const aFirst = text.indexOf("[");
  const aLast = text.lastIndexOf("]");
  if (aFirst >= 0 && aLast > aFirst) {
    const candidate = text.slice(aFirst, aLast + 1);
    try { return JSON.parse(candidate); } catch(e){}
  }
  // Then object — widest {...} span
  const oFirst = text.indexOf("{");
  const oLast = text.lastIndexOf("}");
  if (oFirst >= 0 && oLast > oFirst) {
    const candidate = text.slice(oFirst, oLast + 1);
    try { return JSON.parse(candidate); } catch(e){}
  }
  return null;
}

/* Build a single row's data snippet for batch prompts — only non-empty fields */
function rowSnippet(row, idx) {
  const feats = state.sel.features.length ? state.sel.features : state.data.cols.slice(0, 6);
  const o = { __idx__: idx };
  feats.forEach(f => {
    const v = row[f];
    if (v != null && v !== "" && String(v).toLowerCase() !== "nan") {
      o[f] = String(v).slice(0, 250);
    }
  });
  // Safety net: if selected features produced zero values, dump ALL non-empty fields from the row
  if (Object.keys(o).length <= 1) {
    const allCols = state.data.cols.length ? state.data.cols : Object.keys(row);
    allCols.forEach(f => {
      if (f.startsWith("__")) return;
      const v = row[f];
      if (v != null && v !== "" && String(v).toLowerCase() !== "nan") {
        o[f] = String(v).slice(0, 250);
      }
    });
  }
  return o;
}

/* Case-/space-insensitive key lookup — Claude often changes "Tech_Stack" → "tech_stack" etc. */
function pickKey(obj, target) {
  if (obj == null || typeof obj !== "object") return undefined;
  if (target in obj) return obj[target];
  const norm = s => String(s).toLowerCase().replace(/[\s_\-]+/g, "");
  const want = norm(target);
  for (const k of Object.keys(obj)) {
    if (norm(k) === want) return obj[k];
  }
  return undefined;
}

/* Stringify any value safely for a sheet cell */
function cellify(v) {
  if (v == null) return "";
  if (typeof v === "string") return v;
  if (typeof v === "number" || typeof v === "boolean") return String(v);
  return JSON.stringify(v);
}

/* ─────────── Pure-JS duplicate finder (no API, no cost, instant) ─────────── */
function runDedupe(removeMode) {
  if (!state.data.rows.length) { toast("Load a dataset first", "err"); return; }
  const feats = state.sel.features;
  if (!feats.length) {
    toast("Select at least one feature chip (e.g. Company + Name) to define a duplicate", "err");
    return;
  }

  const colName = removeMode ? null : ($("ask-col").value.trim() || "Is_Duplicate");
  const normalize = (v) => String(v==null?"":v).toLowerCase().trim().replace(/\s+/g," ");

  const seen = new Map();   // key -> first row index
  const groups = new Map(); // key -> count
  state.data.rows.forEach((r, idx) => {
    const key = feats.map(f => normalize(r[f])).join("||");
    if (!seen.has(key)) seen.set(key, idx);
    groups.set(key, (groups.get(key) || 0) + 1);
  });

  let uniqueCount = 0, dupeCount = 0;
  if (!removeMode) {
    // Mark mode — add Yes/No column
    if (!state.data.cols.includes(colName)) state.data.cols.push(colName);
    state.data.rows.forEach((r, idx) => {
      const key = feats.map(f => normalize(r[f])).join("||");
      const count = groups.get(key);
      const isFirst = seen.get(key) === idx;
      // "No" for the first occurrence, "Yes" for duplicates thereafter
      r[colName] = count > 1 && !isFirst ? "Yes" : "No";
      if (r[colName] === "Yes") dupeCount++; else uniqueCount++;
    });
    renderTable();
    state.stageDone.add("ask");
    toast(`Done · ${dupeCount} duplicates marked "Yes" · ${uniqueCount} unique rows marked "No"`, "ok");
    $("ask-out").innerHTML = `
      <div class="card">
        <div style="font-weight:600;margin-bottom:6px">✓ Dedupe complete</div>
        <div>Based on: <b>${esc(feats.join(" + "))}</b></div>
        <div>Column added: <code>${esc(colName)}</code></div>
        <div style="margin-top:8px"><b>${dupeCount}</b> duplicate rows (first occurrence = No · subsequent = Yes)</div>
        <div><b>${uniqueCount}</b> unique-first rows</div>
        <div><b>${groups.size}</b> distinct combinations across ${state.data.rows.length} total rows</div>
      </div>`;
  } else {
    // Remove mode — keep only first occurrence
    if (!confirm(`Remove ${state.data.rows.length - groups.size} duplicate rows? This keeps only the first occurrence of each ${feats.join(" + ")} combination.`)) return;
    const kept = [];
    state.data.rows.forEach((r, idx) => {
      const key = feats.map(f => normalize(r[f])).join("||");
      if (seen.get(key) === idx) kept.push(r);
    });
    const removed = state.data.rows.length - kept.length;
    state.data.rows = kept;
    renderTable();
    state.stageDone.add("ask");
    toast(`Removed ${removed} duplicate rows · ${kept.length} unique rows remain`, "ok");
    $("ask-out").innerHTML = `
      <div class="card">
        <div style="font-weight:600;margin-bottom:6px">✓ Duplicates removed</div>
        <div>Based on: <b>${esc(feats.join(" + "))}</b></div>
        <div style="margin-top:8px"><b>${removed}</b> rows removed</div>
        <div><b>${kept.length}</b> unique rows remain</div>
      </div>`;
  }
}

function buildAskPrompt(row, overrideQ) {
  const q = overrideQ != null ? overrideQ : $("ask-q").value.trim();
  let feats = state.sel.features.length ? state.sel.features : state.data.cols.slice(0, 6);
  // Only include features that actually have a value — sending "N/A" noise makes Claude bail
  let lines = feats
    .map(f => {
      const v = row[f];
      if (v == null || v === "" || String(v).toLowerCase() === "nan") return null;
      return `- ${f}: ${String(v).slice(0,500)}`;
    })
    .filter(Boolean);
  // Safety net: if selected features produced zero values, dump ALL non-empty fields
  if (lines.length === 0) {
    const allCols = state.data.cols.length ? state.data.cols : Object.keys(row);
    lines = allCols
      .map(f => {
        const v = row[f];
        if (v == null || v === "" || String(v).toLowerCase() === "nan") return null;
        return `- ${f}: ${String(v).slice(0,500)}`;
      })
      .filter(Boolean);
  }
  const data = lines.length ? lines.join("\n") : "- (no structured fields provided — use the company name and your general knowledge to infer)";
  return `Company Data:\n${data}\n\nInstruction: ${q}\n\nEven if some fields are missing, make a confident best-effort inference. Do NOT respond with 'Insufficient data' unless truly nothing is known.`;
}

async function decideMode(question) {
  // Tiny router call — Haiku tells us per_row vs list in <1s
  const text = await anthropicCall(
    state.models.bulk,
    "Return exactly one word: PER_ROW if the instruction should be applied to EACH row (classify, score, enrich, look up, summarize each), or LIST if it should be applied ONCE over the whole dataset (hypothesis, overall insight, schema, strategy).",
    `Instruction: ${question}\n\nOne word answer: PER_ROW or LIST`,
    15
  );
  return text.toUpperCase().includes("LIST") ? "list" : "per_row";
}

async function runAsk() {
  if (state.running) { toast("A run is already in progress", "err"); return; }
  if (!state.keys.anthropic) { toast("Anthropic key required", "err"); return; }
  const q = $("ask-q").value.trim();
  if (!q) { toast("Type your instruction", "err"); return; }

  const col = $("ask-col").value.trim() || "AI_Answer";
  const model = $("ask-model").value;
  const conc = parseInt($("ask-conc").value) || 10;
  const web = $("ask-web").checked;
  let mode = $("ask-mode").value;

  toast("Running Claude…", "info");
  updateStep("ask-steps", 0, "run");

  // Auto-route if needed
  if (mode === "auto") {
    try { mode = await decideMode(q); }
    catch(e) { mode = "per_row"; }
    toast(`Mode: ${mode === "list" ? "whole list" : "per row"}`, "info");
  }
  updateStep("ask-steps", 0, "done");
  updateStep("ask-steps", 1, "run");

  state.gtm.lastAsk = { q, col, mode, web };

  const tools = web ? [{ type:"web_search_20250305", name:"web_search" }] : null;
  const system = mode === "list"
    ? "You are a senior GTM strategist. Analyze the provided sample and answer the user's instruction in structured plain text. Be specific, not generic. Where the user asks for a table of results, return a clean markdown table with headers."
    : "You are a senior GTM research analyst. Answer the instruction concisely for this one company. Make confident inferences from whatever signals you have — company name alone is often enough to make an educated guess. Only reply 'Insufficient data' if you truly cannot even guess (this should be rare).";

  if (mode === "list") {
    // Run ONCE on a sample of the list
    updateStep("ask-steps", 1, "done");
    updateStep("ask-steps", 2, "run");
    const sample = state.data.rows.slice(0, 25).map(r => {
      const o = {};
      (state.sel.features.length ? state.sel.features : state.data.cols.slice(0,8))
        .forEach(f => o[f] = String(r[f]||'').slice(0,150));
      return o;
    });
    const prompt = `Instruction: ${q}\n\nSample rows (up to 25):\n${JSON.stringify(sample, null, 2)}\n\nFull dataset: ${state.data.rows.length} rows. Available columns: ${state.data.cols.join(", ")}`;
    showProg("Claude thinking…", 1);
    progLog(`List-mode · model=${model} · web_search=${web?"on":"off"} · sample=${sample.length} rows · prompt=${prompt.length} chars`);
    try {
      const text = await anthropicCall(model, system, prompt, 4000, tools);
      progLog(`Response received · ${text.length} chars`);
      state.gtm.lastAnswer = text;
      const all = parseAllMarkdownTables(text);
      const parsed = all.merged;
      const tableInfo = all.tables.length
        ? `<div class="muted" style="margin:6px 0">Detected <b>${all.tables.length}</b> table${all.tables.length>1?"s":""} · <b>${all.merged.rows.length}</b> total rows · ${all.tables.map((t,i)=>`T${i+1}: ${t.rows.length}×${t.cols.length}`).join(" · ")}</div>`
        : `<div class="muted" style="margin:6px 0">No markdown tables detected — answer is prose.</div>`;
      $("ask-out").innerHTML = `
        <div class="card">
          <pre style="white-space:pre-wrap;font-family:inherit;font-size:12px;max-height:400px;overflow:auto">${esc(text)}</pre>
          ${tableInfo}
          <div class="row" style="margin-top:10px">
            <button class="btn sec" id="ans-copy">📋 Copy Text</button>
            <button class="btn sec" id="ans-xlsx" ${parsed?'':'disabled'}>↓ Download as XLSX</button>
            <button class="btn" id="ans-sheet" ${parsed && state.google.token?'':'disabled'}>${state.google.token?'↑ Save to New Google Sheet Tab':'Connect Google first'}</button>
          </div>
        </div>`;
      $("ans-copy").onclick = () => { navigator.clipboard.writeText(text); toast("Copied", "ok"); };
      if (parsed) {
        $("ans-xlsx").onclick = () => saveAnswerAsXLSX(parsed);
        if (state.google.token) $("ans-sheet").onclick = () => saveAnswerToNewTab(parsed);
      }
      updateStep("ask-steps", 2, "done");
      updateStep("ask-steps", 3, "done");
      state.stageDone.add("ask");
      renderRail();
      toast(parsed ? `Answer ready · ${parsed.rows.length}-row table detected` : "Answer ready", "ok");
    } catch(e) {
      // Render error directly into ask-out so user can read and retry
      $("ask-out").innerHTML = `
        <div class="card" style="border-color:var(--err)">
          <div style="color:var(--err);font-weight:600;margin-bottom:6px">❌ Claude call failed</div>
          <pre style="white-space:pre-wrap;font-family:inherit;font-size:12px;color:var(--err-fg,#f88)">${esc(e.message)}</pre>
          <div class="muted" style="margin-top:8px">Common causes: invalid API key (must start with sk-ant-), rate limit, web_search timeout, or model unavailable. Check the progress log above.</div>
          <button class="btn sec" id="ans-retry" style="margin-top:10px">🔁 Retry</button>
        </div>`;
      $("ans-retry").onclick = () => runAsk();
      updateStep("ask-steps", 2, "err");
      toast("Failed: "+e.message.slice(0,120), "err");
    } finally {
      hideProg();
    }
    return;
  }

  // Per-row mode — BATCHED: N rows per API call for cost + consistency
  const colNames = col.split(",").map(s => s.trim()).filter(Boolean);
  if (colNames.length === 0) colNames.push("AI_Answer");
  const multiCol = colNames.length > 1;
  const batchSize = Math.max(1, Math.min(30, parseInt($("ask-batch").value) || 10));

  // Register all target columns up-front so the table renders them
  colNames.forEach(c => { if (!state.data.cols.includes(c)) state.data.cols.push(c); });
  renderTable();
  updateStep("ask-steps", 1, "done");
  updateStep("ask-steps", 2, "run");

  const rows = state.data.rows;

  // ───── Build chunks of rows (absolute indices preserved) ─────
  const chunks = [];
  for (let i = 0; i < rows.length; i += batchSize) {
    chunks.push({ start: i, rows: rows.slice(i, i + batchSize) });
  }

  // ───── System prompts ─────
  const keysSig = colNames.map(c => JSON.stringify(c)).join(", ");
  const batchSystem = `You are a senior GTM research analyst. You will receive a batch of N company rows. For EACH row, answer the user's instruction.

STRICT OUTPUT RULES:
- Return ONLY a raw JSON array of EXACTLY N objects, same order as input (index 0..N-1).
- Each object MUST have EXACTLY these keys (no extras, no missing): ${keysSig}
- Each value: short string under 200 chars. Prefer concrete nouns, stages, categories over hedged prose.
- Make confident inferences from signals in the row. Use "Insufficient data" as a value ONLY when you truly cannot guess.
- No markdown fences, no prose before or after. Output starts with [ and ends with ].`;

  const singleSystem = multiCol
    ? `You are a senior GTM research analyst. For the one company described, return ONLY a raw JSON object with EXACTLY these keys: ${keysSig}. Each value is a short string under 200 chars. Output starts with { and ends with }. No prose, no fences.`
    : system;

  showProg(`Running ${rows.length} rows in ${chunks.length} batch${chunks.length>1?"es":""} of ≤${batchSize}…`, rows.length);
  progLog(`Per-row BATCHED · model=${model} · conc=${conc} · batch=${batchSize} · chunks=${chunks.length} · web_search=${web?"on":"off"} · cols=[${colNames.join(", ")}]`);

  state.running = true;
  let errCount = 0;
  let parseFailCount = 0;
  let batchFallbackCount = 0;

  // ───── Single-row fallback (reused when a batch fails to parse) ─────
  async function processSingleRow(row, absIdx) {
    try {
      const prompt = buildAskPrompt(row, q);
      const maxTok = multiCol ? (web ? 1400 : 600) : (web ? 1024 : 300);
      const ans = await anthropicCall(model, singleSystem, prompt, maxTok, tools);
      if (multiCol) {
        const obj = extractJSON(ans);
        if (obj && typeof obj === "object" && !Array.isArray(obj)) {
          let filled = 0;
          colNames.forEach(c => {
            const v = pickKey(obj, c);
            row[c] = cellify(v);
            if (row[c]) filled++;
            markCell(absIdx, c);
          });
          if (filled === 0) {
            // Keys completely mismatched — dump raw so user sees what Claude said
            parseFailCount++;
            row[colNames[0]] = "[KEY MISMATCH] Claude returned: " + JSON.stringify(obj).slice(0, 250);
            markCell(absIdx, colNames[0]);
            if (parseFailCount <= 2) progLog(`Row ${absIdx+1}: JSON parsed but keys didn't match [${colNames.join(",")}] — got keys [${Object.keys(obj).join(",")}]`);
          }
        } else {
          parseFailCount++;
          row[colNames[0]] = "[NO JSON] " + ans.slice(0, 300);
          for (let k = 1; k < colNames.length; k++) row[colNames[k]] = "";
          markCell(absIdx, colNames[0]);
          if (parseFailCount <= 2) progLog(`Row ${absIdx+1}: no parseable JSON, raw: ${ans.slice(0, 200)}`);
        }
      } else {
        row[colNames[0]] = ans;
        markCell(absIdx, colNames[0]);
      }
    } catch(e) {
      row[colNames[0]] = "[ERR] " + e.message.slice(0,80);
      errCount++;
    }
    tickProg();
  }

  // Log the first batch's raw response so user can diagnose "nothing written"
  let debugLoggedFirstBatch = false;

  try {
    await pool(chunks, conc, async (chunk, chunkIdx) => {
      if (!state.running) return;
      const N = chunk.rows.length;

      // ── Fast path: single-row batches skip the JSON-array ceremony ──
      if (N === 1) {
        await processSingleRow(chunk.rows[0], chunk.start);
        return;
      }

      // ── Build batch prompt with compact row snippets ──
      const snippets = chunk.rows.map((r, i) => rowSnippet(r, i));
      const batchPrompt = `Instruction: ${q}

Rows (${N} items, indexed 0..${N-1}):
${JSON.stringify(snippets, null, 2)}

Return a JSON array of EXACTLY ${N} objects now (one per row, same order, keys = ${keysSig}):`;

      // Token budget: ~200 tokens/row + 300 overhead, capped by model
      const maxTok = Math.min(
        web ? 8000 : 4000,
        N * (multiCol ? 250 : 180) + 400
      );

      try {
        const ans = await anthropicCall(model, batchSystem, batchPrompt, maxTok, tools);

        // Log first batch raw output so user can see what Claude actually returned
        if (!debugLoggedFirstBatch) {
          debugLoggedFirstBatch = true;
          progLog(`First batch raw (${ans.length} chars): ${ans.slice(0, 300)}${ans.length>300?"…":""}`);
        }

        const arr = extractJSON(ans);

        // Helper to write one row from one object (both full-array and partial-array paths)
        const writeRow = (row, i, obj) => {
          const abs = chunk.start + i;
          if (obj && typeof obj === "object" && !Array.isArray(obj)) {
            let filled = 0;
            colNames.forEach(c => {
              const v = pickKey(obj, c);
              const s = cellify(v);
              row[c] = s;
              if (s) filled++;
              markCell(abs, c);
            });
            if (filled === 0) {
              parseFailCount++;
              row[colNames[0]] = "[KEY MISMATCH] " + JSON.stringify(obj).slice(0, 250);
              markCell(abs, colNames[0]);
              if (parseFailCount === 1) progLog(`Batch ${chunkIdx+1} row ${abs+1}: keys returned [${Object.keys(obj).join(",")}] don't match asked [${colNames.join(",")}]`);
            }
          } else {
            parseFailCount++;
            row[colNames[0]] = "[missing in batch]";
            markCell(abs, colNames[0]);
          }
          tickProg();
        };

        if (Array.isArray(arr) && arr.length >= N) {
          // ── Happy path: assign each result to its row ──
          chunk.rows.forEach((row, i) => writeRow(row, i, arr[i]));
        } else if (Array.isArray(arr) && arr.length > 0 && arr.length < N) {
          // Partial array — use what we got, mark the rest as missing
          progLog(`Batch ${chunkIdx+1}: got ${arr.length}/${N} objects, filling partial`);
          chunk.rows.forEach((row, i) => writeRow(row, i, arr[i]));
        } else {
          // ── Parse failed: fall back to one call per row for this chunk ──
          batchFallbackCount++;
          if (batchFallbackCount <= 2) {
            progLog(`Batch ${chunkIdx+1}: no JSON array found (got ${typeof arr}), falling back to single-row. Raw: ${ans.slice(0, 200)}`);
          }
          for (let i = 0; i < N; i++) {
            if (!state.running) break;
            await processSingleRow(chunk.rows[i], chunk.start + i);
          }
        }
      } catch(e) {
        // Whole-batch API failure: retry each row individually
        batchFallbackCount++;
        if (batchFallbackCount <= 2) progLog(`Batch ${chunkIdx+1} API call failed (${e.message.slice(0,80)}) — retrying row-by-row`);
        for (let i = 0; i < N; i++) {
          if (!state.running) break;
          await processSingleRow(chunk.rows[i], chunk.start + i);
        }
      }
    });

    state.stageDone.add("ask");
    updateStep("ask-steps", 2, "done");
    updateStep("ask-steps", 3, "done");
    renderRail();
    setStatus("Done", "ok");
    // Force a full table repaint — cheap for <500 rows, silent-no-op for rows >500
    renderTable();
    persist();

    const okCount = rows.length - errCount - parseFailCount;
    const colLabel = multiCol ? `[${colNames.join(", ")}]` : `"${colNames[0]}"`;
    let msg = `Answered ${okCount}/${rows.length} rows → ${colLabel}`;
    if (batchFallbackCount) msg += ` · ${batchFallbackCount} batch fallback${batchFallbackCount>1?"s":""}`;
    if (errCount) msg += ` · ${errCount} errors`;
    if (parseFailCount) msg += ` · ${parseFailCount} parse issues`;
    const apiCalls = chunks.length + batchFallbackCount * batchSize; // rough estimate
    progLog(`Done · ~${apiCalls} API calls (vs ${rows.length} w/o batching · ${Math.round(Math.max(0, 1 - apiCalls/rows.length)*100)}% saved)`);

    // Visible completion card with preview so user KNOWS it worked
    const sample = rows.slice(0, 3).map((r, i) => {
      const cells = colNames.map(c => `<td style="padding:4px 8px;border:1px solid var(--border);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(String(r[c]||"").slice(0,120))}</td>`).join("");
      return `<tr><td style="padding:4px 8px;border:1px solid var(--border);color:var(--muted)">row ${i+1}</td>${cells}</tr>`;
    }).join("");
    const header = `<tr><th style="padding:4px 8px;border:1px solid var(--border);background:var(--bg2)">#</th>${colNames.map(c=>`<th style="padding:4px 8px;border:1px solid var(--border);background:var(--bg2)">${esc(c)}</th>`).join("")}</tr>`;
    $("ask-out").innerHTML = `
      <div class="card" style="border-color:${(errCount||parseFailCount)?'var(--err)':'var(--ok,#2ea043)'}">
        <div style="font-weight:600;margin-bottom:6px">${(errCount||parseFailCount)?'⚠️':'✅'} ${esc(msg)}</div>
        <div class="muted" style="font-size:12px;margin-bottom:8px">Batches: ${chunks.length} · batch size: ${batchSize} · API calls: ~${apiCalls} · cols written: ${colNames.length}</div>
        <div style="overflow:auto"><table style="border-collapse:collapse;font-size:12px">${header}${sample}</table></div>
        <div class="muted" style="font-size:12px;margin-top:8px">Scroll the main table below to see all rows. Use Download CSV / XLSX / Push to Sheet (top bar) to export.</div>
        <div class="row" style="margin-top:10px">
          <button class="btn" onclick="downloadXLSX()">↓ Download XLSX</button>
          <button class="btn sec" onclick="downloadCSV()">↓ Download CSV</button>
          ${state.google.token ? '<button class="btn sec" onclick="go(\'export\')">↑ Push to Google Sheet</button>' : ''}
        </div>
      </div>`;
    toast(msg, (errCount || parseFailCount) ? "err" : "ok");
  } catch(e) {
    updateStep("ask-steps", 2, "err");
    toast("Per-row run crashed: "+e.message.slice(0,120), "err");
    $("ask-out").innerHTML = `<div class="card" style="border-color:var(--err)"><div style="color:var(--err);font-weight:600">❌ ${esc(e.message)}</div></div>`;
  } finally {
    state.running = false;
    hideProg();
  }
}


/* ──────────── Markdown-table parser + save helpers ──────────── */
/* Parse ALL markdown tables in a Claude response. Returns:
   {
     tables: [{cols: [...], rows: [{col:val,...}]}, ...],  // each table separately
     merged: {cols: [...], rows: [...]}                    // all tables unioned into one schema
   }
*/
function parseAllMarkdownTables(text) {
  if (!text) return { tables: [], merged: null };
  const lines = text.split(/\r?\n/);
  const splitRow = (l) => l.trim().replace(/^\|/,"").replace(/\|$/,"").split("|").map(c => c.trim());
  const tables = [];
  let i = 0;
  while (i < lines.length - 1) {
    const a = lines[i].trim(), b = lines[i+1].trim();
    if (a.startsWith("|") && /^\|[\s:\-\|]+\|$/.test(b.replace(/\s/g,""))) {
      const start = i;
      let j = i + 2;
      while (j < lines.length && lines[j].trim().startsWith("|")) j++;
      const cols = splitRow(lines[start]);
      const rows = [];
      for (let k = start + 2; k < j; k++) {
        const cells = splitRow(lines[k]);
        const obj = {};
        cols.forEach((c, ix) => obj[c] = cells[ix] || "");
        rows.push(obj);
      }
      if (rows.length) tables.push({ cols, rows });
      i = j;
    } else {
      i++;
    }
  }
  if (!tables.length) return { tables: [], merged: null };

  // Union schema: merge all tables into one with combined column set
  const allCols = [];
  tables.forEach(t => t.cols.forEach(c => { if (!allCols.includes(c)) allCols.push(c); }));
  const mergedRows = [];
  tables.forEach((t, tIdx) => {
    t.rows.forEach(r => {
      const obj = {};
      allCols.forEach(c => obj[c] = r[c] || "");
      if (tables.length > 1) obj.__table__ = `Table ${tIdx + 1}`;
      mergedRows.push(obj);
    });
  });
  const mergedCols = tables.length > 1 ? [...allCols, "__table__"] : allCols;
  return { tables, merged: { cols: mergedCols, rows: mergedRows } };
}

// Back-compat alias — returns the merged (combined) view so old callers keep working
function parseMarkdownTable(text) {
  const r = parseAllMarkdownTables(text);
  return r.merged;
}

function saveAnswerAsXLSX(parsed) {
  const wb = XLSX.utils.book_new();
  const all = parseAllMarkdownTables(state.gtm.lastAnswer || "");

  // One sheet per detected table + a combined sheet if >1
  if (all.tables.length > 1) {
    const combined = XLSX.utils.json_to_sheet(all.merged.rows, { header: all.merged.cols });
    XLSX.utils.book_append_sheet(wb, combined, "Combined");
    all.tables.forEach((t, i) => {
      const ws = XLSX.utils.json_to_sheet(t.rows, { header: t.cols });
      XLSX.utils.book_append_sheet(wb, ws, `Table_${i+1}`);
    });
  } else if (all.tables.length === 1) {
    const ws = XLSX.utils.json_to_sheet(all.tables[0].rows, { header: all.tables[0].cols });
    XLSX.utils.book_append_sheet(wb, ws, "Analysis");
  } else {
    // No tables found — just dump raw
    const ws = XLSX.utils.json_to_sheet(parsed?.rows || [], { header: parsed?.cols || ["answer"] });
    XLSX.utils.book_append_sheet(wb, ws, "Analysis");
  }
  if (state.gtm.lastAnswer) {
    const ws2 = XLSX.utils.aoa_to_sheet([["Raw Claude Answer"], ...state.gtm.lastAnswer.split(/\r?\n/).map(l => [l])]);
    XLSX.utils.book_append_sheet(wb, ws2, "Raw");
  }
  const fname = (state.data.fileName || "gtm").replace(/\.(xlsx|csv)$/i, "") + "_analysis.xlsx";
  XLSX.writeFile(wb, fname);
  toast(`Downloaded ${fname} · ${all.tables.length} tables`, "ok");
}

async function saveAnswerToNewTab(parsed) {
  if (!state.google.token) { toast("Connect Google in Keys stage first", "err", 6000); return; }
  const sid = state.data.sheetId || prompt("No sheet loaded. Paste target Google Sheet URL:");
  if (!sid) return;
  const sheetId = typeof sid === "string" && sid.includes("/") ? parseSheetId(sid) : sid;
  const stamp = new Date().toISOString().slice(0,16).replace(/[:T]/g,"-");

  const all = parseAllMarkdownTables(state.gtm.lastAnswer || "");
  if (!all.tables.length) {
    toast("No markdown tables detected in answer. Nothing to write.", "err", 6000);
    return;
  }

  // Decide strategy: 1 table → single tab. Multiple → combined tab + per-table tabs.
  const writePlan = [];
  if (all.tables.length > 1) {
    writePlan.push({ name: `Analysis_Combined_${stamp}`, cols: all.merged.cols, rows: all.merged.rows });
    all.tables.forEach((t, i) => {
      writePlan.push({ name: `Analysis_T${i+1}_${stamp}`, cols: t.cols, rows: t.rows });
    });
  } else {
    const t = all.tables[0];
    writePlan.push({ name: `Analysis_${stamp}`, cols: t.cols, rows: t.rows });
  }

  const results = [];
  try {
    toast(`Creating ${writePlan.length} tab${writePlan.length>1?"s":""}…`, "info", 4000);
    for (const plan of writePlan) {
      try {
        await gFetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}:batchUpdate`, {
          method:"POST", body: JSON.stringify({ requests:[{ addSheet:{ properties:{ title: plan.name }}}] })
        });
        const values = [plan.cols, ...plan.rows.map(r => plan.cols.map(c => r[c] || ""))];
        await gFetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${encodeURIComponent(plan.name)}?valueInputOption=RAW`, {
          method:"PUT", body: JSON.stringify({ values })
        });
        results.push(`✓ "${plan.name}" · ${plan.rows.length} rows`);
      } catch(e) {
        results.push(`✗ "${plan.name}" failed: ${e.message.slice(0,80)}`);
      }
    }
    toast(`Wrote ${writePlan.length} tab${writePlan.length>1?"s":""} · ${all.merged.rows.length} total rows`, "ok", 6000);
    // Append visible result summary so user sees what happened
    const out = $("ask-out");
    if (out) {
      const summary = document.createElement("div");
      summary.className = "card";
      summary.style.marginTop = "10px";
      summary.innerHTML = `<div style="font-weight:600;margin-bottom:6px">📄 Saved to Google Sheet</div>${results.map(r => `<div>${esc(r)}</div>`).join("")}<div class="muted" style="margin-top:6px">Sheet ID: <code>${esc(sheetId)}</code></div>`;
      out.appendChild(summary);
    }
  } catch(e) {
    toast("Sheet write failed: " + e.message, "err", 8000);
  }
}

/* ──────────── Stage: People (Apify) ──────────── */
/* ═══════════════════════════════════════════════════════════════
   People-enrichment providers — pluggable registry

   Each provider exposes:
     label        : human-readable name for UI
     hasKey       : () => bool (is this provider configured?)
     unitCost     : { credits:<n>, note:<"..."> }  per successful company lookup
     supports     : (query) => bool — can this provider serve this input shape?
     search       : async ({company, domain, linkedin}, max) => [Person]

   A Person is normalized to:
     { name, title, linkedin_url, email, phone, location, source }

   Contract: providers should throw on auth errors (401/403) so the run can
   stop fast. All other failures should return [] and log a warning.
   ═══════════════════════════════════════════════════════════════ */
const PROVIDERS = {
  apify: {
    label: "Apify (LinkedIn scraper + leads-finder)",
    hasKey: () => !!state.keys.apify,
    unitCost: { credits: 1, note: "~$0.01 per actor run (2 actors tried)" },
    supports: q => !!(q.linkedin || q.company),
    async search(q, max) {
      // Prefer LinkedIn scraper when URL known, else leads-finder by company+domain
      let out = [];
      if (q.linkedin) {
        try { out = await apifyRun("george.the.developer~linkedin-company-employees-scraper",
          { companyUrls:[q.linkedin], maxEmployees:max, outputType:"fullWithEmail" }, max); } catch(e) { progLog("Apify LI: "+e.message.slice(0,100)); }
      }
      if (!out.length && q.company) {
        try { out = await apifyRun("code_crafter~leads-finder",
          { company:q.company, domain:q.domain||"", limit:max }, max); } catch(e) { progLog("Apify LF: "+e.message.slice(0,100)); }
      }
      return out.map(it => normalizePerson({
        name:        it.fullName || it.name || `${it.first_name||""} ${it.last_name||""}`,
        title:       it.title || it.headline || it.jobTitle || it.job_title,
        linkedin_url:it.linkedInUrl || it.linkedinUrl || it.profileUrl || it.url || it.linkedin_url || it.linkedin,
        email:       it.email || it.emailAddress || it.work_email || it.personal_email,
        phone:       it.phone || it.phoneNumber || it.phone_number || it.mobile,
        location:    it.location || it.city,
        source:      "apify",
      })).filter(p => p.name);
    },
  },

  apollo: {
    label: "Apollo.io (people search)",
    hasKey: () => !!state.keys.apollo,
    unitCost: { credits: 1, note: "Search is free; email reveal uses credits" },
    supports: q => !!(q.company || q.domain),
    async search(q, max) {
      /* Apollo v2 api_search uses array-style param names */
      const body = {
        page: 1,
        per_page: Math.min(max, 25),
        person_seniorities: ["owner","founder","c_suite","partner","vp","head","director","manager"],
      };
      if (q.domain) {
        const d = q.domain.replace(/^https?:\/\//,"").replace(/^www\./,"").split("/")[0];
        body.q_organization_domains_list = [d];
      }
      if (q.company) body.q_organization_name = q.company;

      const r = await fetch("/api/apollo", {
        method: "POST",
        headers: { "Content-Type":"application/json", "x-apollo-key": state.keys.apollo },
        body: JSON.stringify(body),
      });
      if (r.status === 401 || r.status === 403) throw new Error(`Apollo auth error HTTP ${r.status}`);
      if (r.status === 422) {
        const t = (await r.text()).slice(0, 300);
        progLog(`Apollo 422: ${t}`);
        return [];
      }
      if (!r.ok) { progLog(`Apollo HTTP ${r.status}: ${(await r.text()).slice(0,150)}`); return []; }
      const d = await r.json();
      return (d.people || []).slice(0, max).map(p => normalizePerson({
        name:         p.name || `${p.first_name||""} ${p.last_name||""}`,
        title:        p.title,
        linkedin_url: p.linkedin_url,
        email:        p.email,
        phone:        (p.phone_numbers && p.phone_numbers[0]?.sanitized_number) || "",
        location:     [p.city, p.state, p.country].filter(Boolean).join(", "),
        source:       "apollo",
      })).filter(p => p.name);
    },
  },

  lusha: {
    label: "Lusha (prospecting)",
    hasKey: () => !!state.keys.lusha,
    unitCost: { credits: 1, note: "Search free; reveal (email+phone) ~1 credit/contact" },
    supports: q => !!(q.company || q.domain),
    async search(q, max) {
      const includeDomains = q.domain ? [q.domain.replace(/^https?:\/\//,"").replace(/^www\./,"").split("/")[0]] : [];
      const includeNames = q.company ? [q.company] : [];
      const body = {
        pages: { page: 0, size: Math.min(max, 20) },
        filters: {
          companies: { include: { names: includeNames, domains: includeDomains } },
          contacts: {
            include: {
              seniority: ["manager","director","vp","cxo","owner"],
              existing_data_points: ["phone","work_email"],
            },
          },
        },
      };
      const r = await fetch("/api/lusha", {
        method: "POST",
        headers: { "Content-Type":"application/json", "x-lusha-key": state.keys.lusha },
        body: JSON.stringify(body),
      });
      if (r.status === 401 || r.status === 403) throw new Error(`Lusha auth error HTTP ${r.status}`);
      if (!r.ok) { progLog(`Lusha HTTP ${r.status}: ${(await r.text()).slice(0,150)}`); return []; }
      const d = await r.json();
      return (d.data || []).slice(0, max).map(c => normalizePerson({
        name:         `${c.name?.first||""} ${c.name?.last||""}`,
        title:        c.jobTitle,
        linkedin_url: c.linkedinUrl,
        // Lusha gates real values behind /enrich. We flag availability here to save credits.
        email:        c.hasEmails ? "[available — run Reveal]" : "",
        phone:        c.hasPhones ? "[available — run Reveal]" : "",
        location:     c.location?.rawLocation,
        source:       "lusha",
      })).filter(p => p.name);
    },
  },
};

/* Normalize any provider's row into the common Person shape. */
function normalizePerson(p) {
  const clean = v => (v == null ? "" : String(v).trim());
  const name = clean(p.name).replace(/\s+/g, " ");
  return {
    name,
    title:        clean(p.title),
    linkedin_url: clean(p.linkedin_url),
    email:        clean(p.email),
    phone:        clean(p.phone),
    location:     clean(p.location),
    source:       clean(p.source),
  };
}

/* Build a canonical company key for dedupe + caching. */
function companySignature(row, nmCol, dmCol, liCol) {
  const dom = String(row[dmCol]||"").toLowerCase().replace(/^https?:\/\//,"").replace(/^www\./,"").split("/")[0];
  if (dom) return "d:" + dom;
  const li = String(row[liCol]||"").toLowerCase().match(/linkedin\.com\/company\/([^/?#]+)/);
  if (li) return "l:" + li[1];
  const nm = String(row[nmCol]||"").toLowerCase().trim().replace(/\s+/g," ");
  return nm ? "n:" + nm : null;
}

/* Shared pre-flight: figure out how many unique companies + credits. */
function buildPeoplePlan(dry) {
  const providers = Array.from(document.querySelectorAll("#pp-providers input[data-prov]:checked")).map(e => e.dataset.prov);
  const nmCol = $("pp-name").value, dmCol = $("pp-dom").value, liCol = $("pp-li").value;
  const max = parseInt($("pp-max").value)||3;
  const conc = parseInt($("pp-conc").value)||3;
  const skipFilled = $("pp-skip-filled").checked;
  const dedupe = $("pp-dedupe").checked;
  const budgetOn = $("pp-budget-on").checked;
  const budget = parseInt($("pp-budget").value)||100;

  const sourceRows = dry ? state.data.rows.slice(0, 3) : state.data.rows;
  const seen = new Map();  // sig → { first row idx + all row idxs sharing it }
  let skipped = 0;
  sourceRows.forEach((row, idx) => {
    if (skipFilled && String(row.Person1_Email||"").trim()) { skipped++; return; }
    const sig = companySignature(row, nmCol, dmCol, liCol);
    if (!sig) { skipped++; return; }
    if (!seen.has(sig) || !dedupe) {
      seen.set((dedupe ? sig : sig+"#"+idx), { sig, idxs: [idx], query: {
        company: String(row[nmCol]||"").trim(),
        domain:  String(row[dmCol]||"").trim(),
        linkedin:String(row[liCol]||"").trim(),
      }});
    } else {
      seen.get(sig).idxs.push(idx);
    }
  });
  const uniqueCompanies = [...seen.values()];
  const totalCalls = uniqueCompanies.length;
  const capped = budgetOn ? Math.min(totalCalls, budget) : totalCalls;

  return { providers, nmCol, dmCol, liCol, max, conc, skipFilled, dedupe, budgetOn, budget,
           sourceRows, uniqueCompanies, totalCalls, capped, skipped };
}

async function runPeople(dry) {
  if (state.running) { toast("A run is already in progress", "err"); return; }
  const plan = buildPeoplePlan(dry);
  if (!plan.providers.length) { toast("Pick at least one provider", "err"); return; }

  // Confirm that required keys for selected providers are present
  for (const id of plan.providers) {
    if (!PROVIDERS[id].hasKey()) { toast(`${PROVIDERS[id].label} has no key`, "err"); return; }
  }
  updateStep("pp-steps", 0, "done");

  // Register output columns up-front
  for (let i=1; i<=plan.max; i++) {
    for (const f of ["Name","Title","LinkedIn","Email","Phone","Source"]) {
      const c = `Person${i}_${f}`;
      if (!state.data.cols.includes(c)) state.data.cols.push(c);
    }
  }
  renderTable();
  updateStep("pp-steps", 1, "done");
  updateStep("pp-steps", 2, "run");

  const companies = plan.uniqueCompanies.slice(0, plan.capped);
  showProg(`Finding people · ${companies.length} unique compan${companies.length===1?"y":"ies"}${dry?" (DRY RUN)":""}…`, companies.length);
  progLog(`Plan · ${plan.providers.join("→")} · ${plan.sourceRows.length} rows · ${plan.skipped} skipped · ${plan.totalCalls} unique · ${plan.capped} after budget`);
  state.running = true;

  let foundCount = 0, zeroCount = 0, errCount = 0, authErrAbort = false;

  try {
    await pool(companies, plan.conc, async (entry, i) => {
      if (!state.running || authErrAbort) return;

      // Cache hit? Reuse.
      let people = peopleCache.get(entry.sig);
      if (!people) {
        for (const pid of plan.providers) {
          if (!state.running || authErrAbort) break;
          const prov = PROVIDERS[pid];
          if (!prov.supports(entry.query)) continue;
          try {
            people = await prov.search(entry.query, plan.max);
            if (people && people.length) { progLog(`#${i+1} ${entry.query.company||entry.query.domain||entry.sig} → ${people.length} via ${pid}`); break; }
          } catch(e) {
            if (/auth/i.test(e.message)) {
              authErrAbort = true;
              progLog(`❌ ${pid} auth error — aborting: ${e.message}`);
              toast(`${pid} auth error — run aborted. Fix key on Keys tab.`, "err");
              break;
            }
            errCount++;
            progLog(`#${i+1} ${pid} err: ${e.message.slice(0,100)}`);
          }
        }
        people = people || [];
        peopleCache.set(entry.sig, people);
      } else {
        progLog(`#${i+1} cache hit for ${entry.sig} (${people.length} people)`);
      }

      if (!people.length) zeroCount++; else foundCount++;

      // Write to every row sharing this signature (when dedupe on)
      entry.idxs.forEach(rowIdx => {
        const row = state.data.rows[rowIdx];
        people.slice(0, plan.max).forEach((p, pi) => {
          row[`Person${pi+1}_Name`]     = p.name;
          row[`Person${pi+1}_Title`]    = p.title;
          row[`Person${pi+1}_LinkedIn`] = p.linkedin_url;
          row[`Person${pi+1}_Email`]    = p.email;
          row[`Person${pi+1}_Phone`]    = p.phone;
          row[`Person${pi+1}_Source`]   = p.source;
          markCell(rowIdx, `Person${pi+1}_Name`);
        });
      });
      tickProg();
    });

    updateStep("pp-steps", 2, "done");
    updateStep("pp-steps", 3, "done");
    renderTable();
    persist();
    state.stageDone.add("people");
    renderRail();

    const actualCalls = companies.length - Array.from(peopleCache.keys()).length; // rough — a session may have had prior hits
    const msg = `Found people for ${foundCount}/${companies.length} companies · ${plan.sourceRows.length - plan.skipped} rows affected${zeroCount?` · ${zeroCount} empty`:""}${errCount?` · ${errCount} errors`:""}${dry?" · DRY RUN":""}`;
    const sample = state.data.rows.slice(0, 3).map((r, i) => `<tr>
      <td style="padding:4px 8px;border:1px solid var(--border);color:var(--muted)">${i+1}</td>
      <td style="padding:4px 8px;border:1px solid var(--border)">${esc(String(r.Person1_Name||""))}</td>
      <td style="padding:4px 8px;border:1px solid var(--border)">${esc(String(r.Person1_Title||""))}</td>
      <td style="padding:4px 8px;border:1px solid var(--border)">${esc(String(r.Person1_Email||""))}</td>
      <td style="padding:4px 8px;border:1px solid var(--border)">${esc(String(r.Person1_Source||""))}</td>
    </tr>`).join("");
    $("pp-out").innerHTML = `
      <div class="card" style="border-color:${(errCount||authErrAbort)?'var(--err)':'var(--ok,#2ea043)'}">
        <div style="font-weight:600;margin-bottom:6px">${(errCount||authErrAbort)?'⚠️':'✅'} ${esc(msg)}</div>
        <div style="overflow:auto"><table style="border-collapse:collapse;font-size:12px">
          <tr><th style="padding:4px 8px;border:1px solid var(--border);background:var(--bg2)">#</th><th style="padding:4px 8px;border:1px solid var(--border);background:var(--bg2)">Person1 Name</th><th style="padding:4px 8px;border:1px solid var(--border);background:var(--bg2)">Title</th><th style="padding:4px 8px;border:1px solid var(--border);background:var(--bg2)">Email</th><th style="padding:4px 8px;border:1px solid var(--border);background:var(--bg2)">Source</th></tr>
          ${sample}
        </table></div>
        <div class="row" style="margin-top:10px">
          <button class="btn" onclick="downloadXLSX()">↓ Download XLSX</button>
          <button class="btn sec" onclick="downloadCSV()">↓ Download CSV</button>
        </div>
      </div>`;
    setStatus("People search done", (errCount||authErrAbort) ? "err" : "ok");
    toast(msg, (errCount||authErrAbort) ? "err" : "ok");
  } catch(e) {
    updateStep("pp-steps", 2, "err");
    toast("People run crashed: "+e.message.slice(0,120), "err");
    $("pp-out").innerHTML = `<div class="card" style="border-color:var(--err)"><b>❌ ${esc(e.message)}</b></div>`;
  } finally {
    state.running = false;
    hideProg();
  }
}

/* ──────────── Apify low-level runner (kept separate so other providers don't carry its weight) ──────────── */
async function apifyRun(actor, input, max) {
  const token = state.keys.apify;
  const start = await fetch(`https://api.apify.com/v2/acts/${actor}/runs?token=${token}`, {
    method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(input)
  });
  if (start.status === 401 || start.status === 403) throw new Error(`Apify auth error HTTP ${start.status}`);
  if (!start.ok) throw new Error("apify start "+start.status);
  const { data } = await start.json();
  let succeeded = false;
  for (let i=0;i<40;i++) {
    await sleep(5000);
    const s = await fetch(`https://api.apify.com/v2/actor-runs/${data.id}?token=${token}`);
    if (!s.ok) continue;
    const sj = await s.json();
    const st = sj.data.status;
    if (["FAILED","ABORTED","TIMED-OUT"].includes(st)) { progLog(`Apify actor ${st}`); return []; }
    if (st === "SUCCEEDED") { succeeded = true; break; }
  }
  if (!succeeded) { progLog("Apify polling timed out after 200s"); return []; }
  const items = await (await fetch(`https://api.apify.com/v2/datasets/${data.defaultDatasetId}/items?token=${token}&limit=${max}`)).json();
  return items.slice(0, max);
}

async function pushToSheet() {
  if (!state.google.token) return alert("Connect Google first in Keys stage");
  const sid = $("ex-sid").value.trim() ? parseSheetId($("ex-sid").value) : state.data.sheetId;
  const tab = $("ex-tab").value.trim() || "Enriched";
  if (!sid) return alert("No Sheet ID");
  try {
    // Ensure tab exists
    const meta = await gFetch(`https://sheets.googleapis.com/v4/spreadsheets/${sid}?fields=sheets.properties`);
    const hasTab = meta.sheets.some(s => s.properties.title === tab);
    if (!hasTab) {
      await gFetch(`https://sheets.googleapis.com/v4/spreadsheets/${sid}:batchUpdate`, {
        method:"POST", body: JSON.stringify({ requests:[{ addSheet:{ properties:{ title: tab }}}] })
      });
    } else {
      if (!confirm(`Tab "${tab}" already exists. Clear it and overwrite with enriched data?`)) return;
    }
    // Clear + write
    await gFetch(`https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/${encodeURIComponent(tab)}:clear`, { method:"POST", body:"{}" });
    const values = [state.data.cols, ...state.data.rows.map(r => state.data.cols.map(c => r[c]==null?"":String(r[c])))];
    await gFetch(`https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/${encodeURIComponent(tab)}?valueInputOption=RAW`, {
      method:"PUT", body: JSON.stringify({ values })
    });
    $("ex-msg").innerHTML = `<span class="pill ok">Wrote ${state.data.rows.length} rows to "${esc(tab)}"</span>`;
    state.stageDone.add("export");
    renderRail();
  } catch(e) { $("ex-msg").innerHTML = `<span class="pill err">${esc(e.message)}</span>`; }
}
